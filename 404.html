<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CineAI</title>
    <script>
      // SPA redirect for GitHub Pages: rewrite the path into a query so
      // index.html can restore it. Segment count = repo depth (1 for /ciner/).
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
